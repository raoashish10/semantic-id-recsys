version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    ports:
      - "5001:5000"
    volumes:
      - ../mlruns:/mlruns
      - ../mlartifacts:/mlartifacts
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlartifacts

  # Serving API — uncomment once model artifacts exist
  # api:
  #   build: ..
  #   command: uvicorn serving.api.main:app --host 0.0.0.0 --port 8000
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #   depends_on:
  #     redis:
  #       condition: service_healthy

volumes:
  redis_data:
